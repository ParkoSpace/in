<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkoSpace India</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}?v=4">
    <style>
        /* Google Maps InfoWindow dark override */
        .gm-style .gm-style-iw-c { background:rgba(8,8,22,0.97)!important; border:1px solid rgba(0,212,255,0.35)!important; border-radius:14px!important; box-shadow:0 0 40px rgba(0,212,255,0.15),0 8px 40px rgba(0,0,0,0.7)!important; padding:0!important; }
        .gm-style .gm-style-iw-d { overflow:hidden!important; padding:14px 18px!important; }
        .gm-style .gm-style-iw-t::after { background:rgba(0,212,255,0.6)!important; }
        .gm-style .gm-style-iw-chr { display:none!important; }
        #map-container { outline:none; }
        /* Google Places autocomplete dropdown */
        .pac-container { background:rgba(9,9,22,0.98); border:1px solid rgba(0,212,255,0.25); border-radius:12px; box-shadow:0 8px 40px rgba(0,0,0,0.6); font-family:'Space Grotesk',sans-serif; margin-top:6px; }
        .pac-item { background:transparent; border-top:1px solid rgba(255,255,255,0.04); color:rgba(255,255,255,0.7); padding:10px 16px; cursor:pointer; font-size:0.875rem; }
        .pac-item:hover, .pac-item-selected { background:rgba(0,212,255,0.07); }
        .pac-item-query { color:white; font-weight:600; }
        .pac-icon, .pac-logo { display:none; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="{{ url_for('static', filename='js/app.js') }}?v=4"></script>
</body>
</html>
